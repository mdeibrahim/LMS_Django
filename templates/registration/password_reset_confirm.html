{% extends 'base.html' %}
{% block title %}Set new password — Teaching Platform{% endblock %}
{% block content %}
<section class="auth-shell">
    <div class="absolute inset-0 -z-20 bg-[radial-gradient(820px_340px_at_10%_-10%,rgba(59,130,246,0.18),transparent),radial-gradient(760px_320px_at_90%_-12%,rgba(14,165,233,0.18),transparent),linear-gradient(180deg,#f8fafc_0%,#eef2ff_100%)]"></div>
    <div class="mx-auto w-full max-w-lg px-4 sm:px-6">
        <div class="auth-panel p-6 sm:p-8">
            <span class="eyebrow"><i class="fa-solid fa-lock"></i> NEW PASSWORD</span>
            <h2 class="mt-5 text-3xl font-bold text-slate-900">Set a new password</h2>
            <form method="post" class="mt-6 space-y-4">
                {% csrf_token %}
                <div>
                    {{ form.new_password1.label_tag }}
                    {{ form.new_password1 }}
                </div>
                <div>
                    {{ form.new_password2.label_tag }}
                    {{ form.new_password2 }}
                </div>
                <div>
                    <button type="submit" class="inline-flex items-center gap-2 rounded-xl bg-gradient-to-r from-blue-600 to-cyan-600 px-4 py-3 font-semibold text-white">Set password</button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
