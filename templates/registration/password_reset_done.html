{% extends 'base.html' %}
{% block title %}Password reset sent — Teaching Platform{% endblock %}
{% block content %}
<section class="auth-shell">
    <div class="absolute inset-0 -z-20 bg-[radial-gradient(820px_340px_at_10%_-10%,rgba(59,130,246,0.18),transparent),radial-gradient(760px_320px_at_90%_-12%,rgba(14,165,233,0.18),transparent),linear-gradient(180deg,#f8fafc_0%,#eef2ff_100%)]"></div>
    <div class="mx-auto w-full max-w-lg px-4 sm:px-6">
        <div class="auth-panel p-6 text-center sm:p-8">
            <span class="eyebrow"><i class="fa-solid fa-envelope-circle-check"></i> EMAIL SENT</span>
            <h2 class="mt-5 text-3xl font-bold text-slate-900">Check your email</h2>
            <p class="mt-3 text-sm leading-7 text-slate-600">If an account with the provided email exists, you'll receive a password reset link shortly.</p>
            <p class="mt-6"><a href="{% url 'authentication:login' %}" class="font-semibold text-blue-700">Return to login</a></p>
        </div>
    </div>
</section>
{% endblock %}
